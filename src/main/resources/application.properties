spring.application.name=adogta
spring.datasource.url=jdbc:postgresql://${URL_DB}
spring.datasource.username=${USER_DB}
spring.datasource.password=${PASSWORD_DB}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

# Para los correos.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.base-url=${APP_BASE_URL:http://localhost:8080}

# The Dog API / The Cat API
app.thedogapi.base-url=${DOG_API_BASE_URL:https://api.thedogapi.com/v1}
app.thedogapi.key=${DOG_API_KEY:}
app.thecatapi.base-url=${CAT_API_BASE_URL:https://api.thecatapi.com/v1}
app.thecatapi.key=${CAT_API_KEY:}